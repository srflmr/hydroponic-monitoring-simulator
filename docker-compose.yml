name: hydroponic

networks:
  proxy:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
  internal:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres-data:
  influxdb-data:
  influx-tokens:
  authelia-data:
  prometheus-data:
  grafana-data:

services:
  traefik:
    image: traefik:v3.2.1
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    depends_on:
      authelia:
        condition: service_healthy

  authelia:
    image: authelia/authelia:4.38.17
    restart: unless-stopped
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - authelia-data:/data
    environment:
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: ${AUTHELIA_STORAGE_POSTGRES_PASSWORD}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD}
      OPERATOR_DISPLAYNAME: ${OPERATOR_DISPLAYNAME}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL}
    entrypoint:
      - sh
      - -c
      - |
        : "$${OPERATOR_PASSWORD:?operator password required}"
        HASH=$$(authelia crypto hash generate argon2 --password "$$OPERATOR_PASSWORD" | sed -n 's/^Digest: //p')
        cat > /tmp/users_database.yml <<EOF
        users:
          $${OPERATOR_USERNAME}:
            disabled: false
            displayname: "$${OPERATOR_DISPLAYNAME}"
            password: "$${HASH}"
            email: "$${OPERATOR_EMAIL}"
            groups:
              - operators
        EOF
        exec authelia
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ZONE_CONFIG_DB_PASSWORD: ${ZONE_CONFIG_DB_PASSWORD}
      RESOURCE_ARBITRATION_DB_PASSWORD: ${RESOURCE_ARBITRATION_DB_PASSWORD}
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: ${AUTHELIA_STORAGE_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_TELEMETRY_PASSWORD: ${REDIS_TELEMETRY_PASSWORD}
      REDIS_EVALUATOR_PASSWORD: ${REDIS_EVALUATOR_PASSWORD}
      REDIS_ARBITRATION_PASSWORD: ${REDIS_ARBITRATION_PASSWORD}
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command:
      - sh
      - -c
      - |
        {
          echo "user default off"
          echo "user telemetry_ingestion on >$$REDIS_TELEMETRY_PASSWORD resetchannels ~queue:telemetry_for_evaluation +@connection +lpush"
          echo "user zone_evaluator on >$$REDIS_EVALUATOR_PASSWORD resetchannels ~queue:telemetry_for_evaluation ~queue:resource_requests +@connection +brpop +lpush"
          echo "user resource_arbitration on >$$REDIS_ARBITRATION_PASSWORD resetchannels ~queue:resource_requests ~tank:current_volume +@connection +brpop +rpop +get +set"
        } > /tmp/redis-users.acl
        exec redis-server /usr/local/etc/redis/redis.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u redis://resource_arbitration:$$REDIS_ARBITRATION_PASSWORD@localhost:6379 ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION}
      # Admin token for init only. The init script (10-scoped-tokens.sh) creates
      # two bucket-scoped tokens and writes them to scoped-tokens.env on the
      # dedicated influx-tokens volume. Application services source that file at startup.
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influx-tokens:/influx-tokens
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    restart: unless-stopped
    environment:
      SENSOR_SIMULATOR_MQTT_PASSWORD: ${SENSOR_SIMULATOR_MQTT_PASSWORD}
      TELEMETRY_MQTT_PASSWORD: ${TELEMETRY_MQTT_PASSWORD}
      ARBITRATION_MQTT_PASSWORD: ${ARBITRATION_MQTT_PASSWORD}
      ACTUATOR_MQTT_PASSWORD: ${ACTUATOR_MQTT_PASSWORD}
      DASHBOARD_MQTT_PASSWORD: ${DASHBOARD_MQTT_PASSWORD}
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
    entrypoint:
      - sh
      - -c
      - |
        rm -f /tmp/mosquitto-passwd /tmp/mosquitto-acl
        P=/tmp/mosquitto-passwd
        mosquitto_passwd -c -b $$P sensor_simulator "$$SENSOR_SIMULATOR_MQTT_PASSWORD"
        mosquitto_passwd -b $$P telemetry_ingestion "$$TELEMETRY_MQTT_PASSWORD"
        mosquitto_passwd -b $$P resource_arbitration "$$ARBITRATION_MQTT_PASSWORD"
        mosquitto_passwd -b $$P actuator_gateway "$$ACTUATOR_MQTT_PASSWORD"
        mosquitto_passwd -b $$P dashboard_api "$$DASHBOARD_MQTT_PASSWORD"
        chown mosquitto:mosquitto $$P
        chmod 600 $$P
        A=/tmp/mosquitto-acl
        cp /mosquitto/config/acl $$A
        chown mosquitto:mosquitto $$A
        chmod 0700 $$A
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -u dashboard_api -P \"$$DASHBOARD_MQTT_PASSWORD\" -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zone-config:
    build: ./services/zone-config
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql://zone_config_app:${ZONE_CONFIG_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sensor-simulator-zone-a:
    build: ./services/sensor-simulator
    restart: unless-stopped
    environment:
      ZONE_ID: zone-a
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: sensor_simulator
      MQTT_PASSWORD: ${SENSOR_SIMULATOR_MQTT_PASSWORD}
      PUBLISH_INTERVAL_SECONDS: "${PUBLISH_INTERVAL_SECONDS:-4}"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sensor-simulator-zone-b:
    build: ./services/sensor-simulator
    restart: unless-stopped
    environment:
      ZONE_ID: zone-b
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: sensor_simulator
      MQTT_PASSWORD: ${SENSOR_SIMULATOR_MQTT_PASSWORD}
      PUBLISH_INTERVAL_SECONDS: "${PUBLISH_INTERVAL_SECONDS:-4}"
      INIT_PH: "5.7"
      INIT_EC: "1.1"
      INIT_WATER_TEMP_C: "20.0"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sensor-simulator-zone-c:
    build: ./services/sensor-simulator
    restart: unless-stopped
    environment:
      ZONE_ID: zone-c
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: sensor_simulator
      MQTT_PASSWORD: ${SENSOR_SIMULATOR_MQTT_PASSWORD}
      PUBLISH_INTERVAL_SECONDS: "${PUBLISH_INTERVAL_SECONDS:-4}"
      INIT_PH: "6.0"
      INIT_EC: "1.6"
      INIT_WATER_TEMP_C: "23.0"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  telemetry-ingestion:
    build: ./services/telemetry-ingestion
    restart: unless-stopped
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: telemetry_ingestion
      MQTT_PASSWORD: ${TELEMETRY_MQTT_PASSWORD}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      REDIS_URL: redis://telemetry_ingestion:${REDIS_TELEMETRY_PASSWORD}@redis:6379
    # INFLUXDB_TOKEN is not set here — it is sourced from the scoped-tokens.env
    # file written by influxdb/init/10-scoped-tokens.sh during first boot.
    # The command sources the file (INFLUXDB_WRITE_TOKEN → INFLUXDB_TOKEN) then
    # starts the app so the InfluxDB client picks up the write-only scoped token.
    # Only the dedicated influx-tokens volume (not the full influxdb-data volume)
    # is mounted here — the container can see the token file but nothing else.
    command:
      - sh
      - -c
      - '. /run/influxdb-secrets/scoped-tokens.env && INFLUXDB_TOKEN=$$INFLUXDB_WRITE_TOKEN exec node src/index.js'
    volumes:
      - influx-tokens:/run/influxdb-secrets:ro
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zone-evaluator:
    build: ./services/zone-evaluator
    restart: unless-stopped
    environment:
      REDIS_URL: redis://zone_evaluator:${REDIS_EVALUATOR_PASSWORD}@redis:6379
      ZONE_CONFIG_URL: http://zone-config:3003
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      zone-config:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NEVER scale this service — it is the single source of truth for tank volume.
  resource-arbitration:
    build: ./services/resource-arbitration
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql://resource_arbitration_app:${RESOURCE_ARBITRATION_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://resource_arbitration:${REDIS_ARBITRATION_PASSWORD}@redis:6379
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: resource_arbitration
      MQTT_PASSWORD: ${ARBITRATION_MQTT_PASSWORD}
      ZONE_CONFIG_URL: http://zone-config:3003
      ARBITRATION_W1: "${ARBITRATION_W1:-0.4}"
      ARBITRATION_W2: "${ARBITRATION_W2:-0.6}"
      ALLOCATION_VOLUME_LITER: "${ALLOCATION_VOLUME_LITER:-5}"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      zone-config:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  actuator-gateway:
    build: ./services/actuator-gateway
    restart: unless-stopped
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: actuator_gateway
      MQTT_PASSWORD: ${ACTUATOR_MQTT_PASSWORD}
      ACTUATOR_DELAY_SECONDS: "${ACTUATOR_DELAY_SECONDS:-1.5}"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard-api:
    build: ./services/dashboard-api
    restart: unless-stopped
    environment:
      ZONE_CONFIG_URL: http://zone-config:3003
      ZONE_EVALUATOR_URL: http://zone-evaluator:3002
      RESOURCE_ARBITRATION_URL: http://resource-arbitration:3004
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_USERNAME: dashboard_api
      MQTT_PASSWORD: ${DASHBOARD_MQTT_PASSWORD}
      CORS_ORIGIN: https://hydroponic.localhost
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    # INFLUXDB_TOKEN is not set here — it is sourced from the scoped-tokens.env
    # file written by influxdb/init/10-scoped-tokens.sh during first boot.
    # The command sources the file (INFLUXDB_READ_TOKEN → INFLUXDB_TOKEN) then
    # starts the app so the InfluxDB client picks up the read-only scoped token.
    # Only the dedicated influx-tokens volume (not the full influxdb-data volume)
    # is mounted here — the container can see the token file but nothing else.
    command:
      - sh
      - -c
      - '. /run/influxdb-secrets/scoped-tokens.env && INFLUXDB_TOKEN=$$INFLUXDB_READ_TOKEN exec node src/index.js'
    volumes:
      - influx-tokens:/run/influxdb-secrets:ro
    networks:
      - internal
      - proxy
    depends_on:
      zone-config:
        condition: service_healthy
      zone-evaluator:
        condition: service_healthy
      resource-arbitration:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      authelia:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-web:
    build: ./services/frontend-web
    restart: unless-stopped
    environment:
      DASHBOARD_API_INTERNAL_URL: http://dashboard-api:3010
      PORT: "3000"
      ORIGIN: https://hydroponic.localhost
    networks:
      - internal
      - proxy
    depends_on:
      dashboard-api:
        condition: service_healthy
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^(/(dev|proc|sys|run/credentials/.+|var/lib/docker/.+|var/lib/kubelet/.+)($|/)|.*docker-desktop-bind-mounts.*)"
    volumes:
      - /:/host:ro
    networks:
      - monitoring
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9100/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    # cgroup v2: run in the host cgroup namespace so cAdvisor can see the
    # /sys/fs/cgroup/docker/<id> container cgroups (otherwise it is rebased to
    # its own private namespace and only reports nameless host cgroups).
    cgroup: host
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Read-only Docker API gateway. cAdvisor cannot enumerate containers on
  # Docker Desktop / WSL2, so docker-stats-exporter reads per-container stats
  # from the Docker Engine API — but THROUGH this proxy, which exposes only
  # GET /containers and /version over TCP (POST disabled), so no container ever
  # holds the root-equivalent docker.sock directly.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      VERSION: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2375/version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Exposes per-container CPU/memory/network as Prometheus metrics, with
  # cAdvisor-compatible metric names so the Containers dashboard is portable
  # (this exporter on Docker Desktop, cAdvisor on a native Linux host).
  docker-stats-exporter:
    build: ./services/docker-stats-exporter
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - monitoring
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9338/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
      - proxy
    depends_on:
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://grafana.hydroponic.localhost
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: Remote-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Email:Remote-Email Name:Remote-Name"
      GF_AUTH_PROXY_WHITELIST: 172.30.0.0/16
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
      - proxy
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
