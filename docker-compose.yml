name: hydroponic

networks:
  proxy:
    driver: bridge
  internal:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres-data:
  influxdb-data:
  authelia-data:

services:
  traefik:
    image: traefik:v3.2.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    depends_on:
      authelia:
        condition: service_healthy

  authelia:
    image: authelia/authelia:4.38.17
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - authelia-data:/data
    environment:
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    networks:
      - proxy

  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - internal
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zone-config:
    build: ./services/zone-config
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sensor-simulator-zone-a:
    build: ./services/sensor-simulator
    environment:
      ZONE_ID: zone-a
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sensor-simulator-zone-b:
    build: ./services/sensor-simulator
    environment:
      ZONE_ID: zone-b
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      INIT_PH: "5.7"
      INIT_EC: "1.1"
      INIT_WATER_TEMP_C: "20.0"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sensor-simulator-zone-c:
    build: ./services/sensor-simulator
    environment:
      ZONE_ID: zone-c
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      INIT_PH: "6.0"
      INIT_EC: "1.6"
      INIT_WATER_TEMP_C: "23.0"
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  telemetry-ingestion:
    build: ./services/telemetry-ingestion
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      REDIS_URL: ${REDIS_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zone-evaluator:
    build: ./services/zone-evaluator
    environment:
      REDIS_URL: ${REDIS_URL}
      ZONE_CONFIG_URL: http://zone-config:3003
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      zone-config:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NEVER scale this service — it is the single source of truth for tank volume.
  resource-arbitration:
    build: ./services/resource-arbitration
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      ZONE_CONFIG_URL: http://zone-config:3003
      ARBITRATION_W1: "0.4"
      ARBITRATION_W2: "0.6"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      zone-config:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  actuator-gateway:
    build: ./services/actuator-gateway
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard-api:
    build: ./services/dashboard-api
    environment:
      ZONE_CONFIG_URL: http://zone-config:3003
      ZONE_EVALUATOR_URL: http://zone-evaluator:3002
      RESOURCE_ARBITRATION_URL: http://resource-arbitration:3004
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      CORS_ORIGIN: https://hydroponic.localhost
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    networks:
      - internal
      - proxy
    depends_on:
      zone-config:
        condition: service_healthy
      resource-arbitration:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      authelia:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-web:
    build: ./services/frontend-web
    environment:
      DASHBOARD_API_INTERNAL_URL: http://dashboard-api:3010
      PORT: "3000"
      ORIGIN: https://hydroponic.localhost
    networks:
      - internal
      - proxy
    depends_on:
      dashboard-api:
        condition: service_healthy
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics | head -1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
