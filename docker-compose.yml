name: hydroponic

networks:
  proxy:
    driver: bridge
  internal:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres-data:
  influxdb-data:
  docker-proxy-sock:

services:
  docker-proxy:
    build: ./docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - docker-proxy-sock:/run/docker-proxy
    environment:
      DOCKER_SOCK: /var/run/docker.sock
      PROXY_SOCK: /run/docker-proxy/docker.sock
      MIN_API_VERSION: "1.40"
    networks: []

  traefik:
    image: traefik:v3.2.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - docker-proxy-sock:/run/docker-proxy:ro
    depends_on:
      - docker-proxy
    networks:
      - proxy

  authelia:
    image: authelia/authelia:4.38.17
    user: "1000:1000"
    volumes:
      - ./authelia:/config
    environment:
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hydroponic_proxy"
      - "traefik.http.routers.authelia.rule=Host(`auth.hydroponic.localhost`)"
      - "traefik.http.routers.authelia.entrypoints=web"
      - "traefik.http.routers.authelia.middlewares=x-forwarded-proto-https@docker"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
      - "traefik.http.middlewares.x-forwarded-proto-https.headers.customrequestheaders.X-Forwarded-Proto=https"

  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - internal
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zone-config:
    build: ./services/zone-config
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sensor-simulator-zone-a:
    build: ./services/sensor-simulator
    environment:
      ZONE_ID: zone-a
      DEVICE_ID: sensor-01
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  telemetry-ingestion:
    build: ./services/telemetry-ingestion
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      REDIS_URL: ${REDIS_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zone-evaluator:
    build: ./services/zone-evaluator
    environment:
      REDIS_URL: ${REDIS_URL}
      ZONE_CONFIG_URL: http://zone-config:3003
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      zone-config:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # NEVER scale this service — it is the single source of truth for tank volume.
  resource-arbitration:
    build: ./services/resource-arbitration
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  actuator-gateway:
    build: ./services/actuator-gateway
    environment:
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard-api:
    build: ./services/dashboard-api
    environment:
      ZONE_CONFIG_URL: http://zone-config:3003
      ZONE_EVALUATOR_URL: http://zone-evaluator:3002
      RESOURCE_ARBITRATION_URL: http://resource-arbitration:3004
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
    networks:
      - internal
    depends_on:
      zone-config:
        condition: service_healthy
      resource-arbitration:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
