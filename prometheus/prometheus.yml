global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Per-container stats via the Docker Engine API (works on Docker Desktop /
  # WSL2 where cAdvisor cannot enumerate containers). cAdvisor-compatible names.
  - job_name: docker-stats
    static_configs:
      - targets: ['docker-stats-exporter:9338']

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']
