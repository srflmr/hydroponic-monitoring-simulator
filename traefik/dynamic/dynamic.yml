http:
  routers:
    authelia:
      rule: "Host(`auth.hydroponic.localhost`)"
      entryPoints:
        - websecure
      service: authelia
      tls: {}

    dashboard-ws:
      rule: "Host(`hydroponic.localhost`) && PathPrefix(`/socket.io`)"
      entryPoints:
        - websecure
      service: dashboard-ws
      middlewares:
        - authelia
      priority: 100
      tls: {}

    frontend:
      rule: "Host(`hydroponic.localhost`)"
      entryPoints:
        - websecure
      service: frontend
      middlewares:
        - authelia
      priority: 10
      tls: {}

    # Public branded /login + the static assets it needs (client bundle, fonts,
    # favicon). No authelia middleware so an unauthenticated visitor can load it;
    # its "Sign in" link navigates to "/", which the gated `frontend` router
    # bounces to the Authelia portal. Server-rendered pages and /socket.io stay
    # gated — only public client assets are exposed here.
    frontend-login:
      rule: "Host(`hydroponic.localhost`) && (PathPrefix(`/login`) || PathPrefix(`/_app`) || PathPrefix(`/fonts`) || Path(`/favicon.png`))"
      entryPoints:
        - websecure
      service: frontend
      priority: 50
      tls: {}

    grafana:
      rule: "Host(`grafana.hydroponic.localhost`)"
      entryPoints:
        - websecure
      service: grafana
      middlewares:
        - authelia
      tls: {}

  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"

    dashboard-ws:
      loadBalancer:
        servers:
          - url: "http://dashboard-api:3010"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend-web:3000"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email
